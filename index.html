<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changue.AR</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>

        <img
            src="img/Logo_Cuadrado.jpeg"
            alt="Logo Changue.AR"
            class="logo">

        <h1>Changue.AR</h1>

        <p>
            Conectando personas con quienes saben hacer el trabajo.
        </p>

    </header>

    <section class="estadisticas">

        <h2>Estado del Sistema</h2>

        <div id="stats">

            <p>Changueadores: <span id="cantChangueadores">0</span></p>
            <p>Tareas: <span id="cantTareas">0</span></p>
            <p>Asignaciones: <span id="cantAsignaciones">0</span></p>
            <p>Publicaciones Activas: <span id="cantPublicaciones">0</span></p>

        </div>

        <button onclick="generarPublicaciones()">
            Actualizar Publicaciones
        </button>

    </section>

    <section class="busqueda">

        <input
            type="text"
            id="buscador"
            placeholder="Buscar servicio...">

    </section>

    <section>

        <h2>Servicios Disponibles</h2>

        <div id="contenedor-servicios">

        </div>

    </section>

    <footer>

        <p>
            AED - Actividad Formativa N°2
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
